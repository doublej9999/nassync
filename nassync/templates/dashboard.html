<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NAS 同步监控</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --text: #1f2a37;
      --muted: #6b7280;
      --ok: #15803d;
      --warn: #b45309;
      --err: #b91c1c;
      --border: #e5e7eb;
      --accent: #0f766e;
      --accent-light: #e6fffa;
    }
    body { margin: 0; font-family: "Microsoft YaHei", "PingFang SC", sans-serif; background: var(--bg); color: var(--text); }
    .wrap { max-width: 1320px; margin: 0 auto; padding: 16px; }
    .topbar { position: sticky; top: 0; z-index: 30; background: #ffffffee; backdrop-filter: blur(6px); border-bottom: 1px solid var(--border); }
    .topbar-inner { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding-top: 10px; padding-bottom: 10px; }
    .topbar-title { font-size: 20px; font-weight: 700; }
    .nav { display: flex; gap: 8px; flex-wrap: wrap; }
    .nav-btn { border: 1px solid var(--border); border-radius: 999px; background: #fff; color: var(--text); padding: 6px 12px; cursor: pointer; }
    .nav-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .content { padding-top: 8px; }
    .page { display: none; }
    .page.active { display: block; }
    .title { font-size: 24px; font-weight: 700; margin: 8px 0; }
    .sub { color: var(--muted); margin-bottom: 16px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(180px,1fr)); gap: 12px; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
    .label { font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    .value { font-size: 28px; font-weight: 700; }
    .ok { color: var(--ok); }
    .warn { color: var(--warn); }
    .err { color: var(--err); }
    .section { margin-top: 14px; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
    .toolbar input, .toolbar select { border: 1px solid var(--border); border-radius: 8px; padding: 6px 8px; font-size: 13px; background: #fff; }
    .toolbar button { border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; font-size: 13px; background: #fff; cursor: pointer; }
    .toolbar button:disabled { color: #9ca3af; cursor: not-allowed; }
    .scope-switch { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
    .scope-note { color: var(--muted); font-size: 12px; }
    .pager { color: var(--muted); font-size: 12px; }
    h2 { font-size: 16px; margin: 0 0 12px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 10px 8px; border-bottom: 1px solid var(--border); text-align: left; vertical-align: top; }
    th { color: var(--muted); font-weight: 600; }
    .mono { font-family: Consolas, monospace; }
    .status { padding: 2px 8px; border-radius: 12px; color: #fff; font-size: 12px; }
    .status.SUCCESS { background: var(--ok); }
    .status.PENDING { background: var(--warn); }
    .status.FAILED { background: var(--err); }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; }
    .pill.feedback { background: #fef3c7; color: #92400e; }
    .pill.normal { background: #dcfce7; color: #166534; }
    .meta { margin-top: 12px; color: var(--muted); font-size: 12px; display: flex; justify-content: space-between; }
    .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-danger { color: var(--err); }
    .cfg-enabled { white-space: nowrap; }
    .section-head { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 12px; }
    .section-head h2 { margin: 0; }
    .modal-mask { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.35); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal-mask.show { display: flex; }
    .modal-card { width: min(760px, calc(100vw - 24px)); background: #fff; border-radius: 10px; border: 1px solid var(--border); padding: 14px; }
    .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 10px; }
    .modal-grid { display: grid; grid-template-columns: 140px 1fr; gap: 10px; align-items: center; }
    .modal-grid input { width: 100%; box-sizing: border-box; border: 1px solid var(--border); border-radius: 8px; padding: 8px; font-size: 13px; }
    .modal-actions { margin-top: 12px; display: flex; justify-content: flex-end; gap: 8px; }
    @media (max-width: 980px) {
      .cfg-enabled { margin-top: 4px; }
      .modal-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="wrap topbar-inner">
      <div class="topbar-title">NAS 文件同步监控</div>
      <div class="nav">
        <button id="nav_stats" class="nav-btn" type="button" data-page="stats">统计页面</button>
        <button id="nav_config" class="nav-btn" type="button" data-page="config">配置页面</button>
      </div>
    </div>
  </div>

  <div class="wrap content">
    <div id="page_stats" class="page">
      <div class="sub">自动刷新间隔：5 秒</div>
      <div class="scope-switch">
        <button id="stats_scope_toggle_btn" type="button" class="btn-primary">切换到回传统计</button>
        <span id="stats_scope_text" class="scope-note">当前统计：非回传</span>
      </div>
      <div class="grid">
        <div class="card"><div class="label">任务总数</div><div id="total_tasks" class="value">-</div></div>
        <div class="card"><div class="label">处理中</div><div id="pending_tasks" class="value warn">-</div></div>
        <div class="card"><div class="label">成功</div><div id="success_tasks" class="value ok">-</div></div>
        <div class="card"><div class="label">失败</div><div id="failed_tasks" class="value err">-</div></div>
        <div class="card"><div class="label">已入库记录</div><div id="total_records" class="value">-</div></div>
      </div>

      <div class="section">
        <h2>类型统计</h2>
        <table>
          <thead><tr><th>类型</th><th>任务数</th><th>最近更新时间</th></tr></thead>
          <tbody id="type_tbody"></tbody>
        </table>
      </div>

      <div class="section">
        <h2>最近任务</h2>
        <div class="toolbar">
          <input id="task_q" type="text" placeholder="搜索类型/压缩包/状态/错误信息/路径">
          <select id="task_page_size">
            <option value="10">10 条/页</option>
            <option value="20" selected>20 条/页</option>
            <option value="50">50 条/页</option>
          </select>
          <button id="task_search_btn" type="button">搜索</button>
          <button id="task_prev_btn" type="button">上一页</button>
          <button id="task_next_btn" type="button">下一页</button>
          <span id="task_pager" class="pager">第 -/- 页，共 0 条</span>
        </div>
        <table>
          <thead><tr><th>时间</th><th>类型</th><th>压缩包</th><th>是否回传</th><th>状态</th><th>错误信息</th></tr></thead>
          <tbody id="task_tbody"></tbody>
        </table>
      </div>

      <div class="section">
        <h2>最近入库记录</h2>
        <div class="toolbar">
          <input id="record_q" type="text" placeholder="搜索类型/LOT/WAFER/来源压缩包">
          <select id="record_page_size">
            <option value="10">10 条/页</option>
            <option value="20" selected>20 条/页</option>
            <option value="50">50 条/页</option>
          </select>
          <button id="record_search_btn" type="button">搜索</button>
          <button id="record_prev_btn" type="button">上一页</button>
          <button id="record_next_btn" type="button">下一页</button>
          <span id="record_pager" class="pager">第 -/- 页，共 0 条</span>
        </div>
        <table>
          <thead><tr><th>时间</th><th>类型</th><th>LOT</th><th>WAFER</th><th>来源压缩包</th><th>ZIP 路径</th></tr></thead>
          <tbody id="record_tbody"></tbody>
        </table>
      </div>

      <div class="meta">
        <span id="refresh_time">更新时间：-</span>
        <span>接口：/api/dashboard</span>
      </div>
    </div>

    <div id="page_config" class="page">
      <div class="sub">管理监听目录与目标目录映射</div>
      <div class="section">
        <div class="section-head">
          <h2>来料路径配置（map_path_config）</h2>
          <button id="cfg_add_btn" class="btn-primary" type="button">新增配置</button>
        </div>
        <table>
          <thead><tr><th>ID</th><th>SYNC_TYPES</th><th>WATCH_DIR</th><th>TARGET_DIR</th><th>是否回传</th><th>状态</th><th>更新时间</th><th>操作</th></tr></thead>
          <tbody id="cfg_tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="cfg_add_modal" class="modal-mask">
    <div class="modal-card">
      <div id="cfg_add_modal_title" class="modal-title">新增来料路径配置</div>
      <div class="modal-grid">
        <input id="add_id" type="hidden" value="">
        <label for="add_sync_types">SYNC_TYPES</label>
        <input id="add_sync_types" type="text" placeholder="例如 BP" value="">
        <label for="add_watch_dir">WATCH_DIR</label>
        <input id="add_watch_dir" type="text" placeholder="" value="">
        <label for="add_target_dir">TARGET_DIR</label>
        <input id="add_target_dir" type="text" placeholder="" value="">
        <label for="add_enabled">启用状态</label>
        <label class="cfg-enabled"><input id="add_enabled" type="checkbox" checked> 启用</label>
        <label for="add_is_feedback">是否回传</label>
        <label class="cfg-enabled"><input id="add_is_feedback" type="checkbox"> 回传（跳过 zip_record 入库）</label>
      </div>
      <div class="modal-actions">
        <button id="cfg_add_cancel_btn" type="button">取消</button>
        <button id="cfg_add_save_btn" class="btn-primary" type="button">确认新增</button>
      </div>
    </div>
  </div>

  <script>
    const state = {
      task: { page: 1, page_size: 20, q: '' },
      record: { page: 1, page_size: 20, q: '' },
      configs: [],
      currentPage: 'stats',
      statsScope: 'normal',
      refreshTimer: null,
    };

    function getScopeText(scope) {
      return scope === 'feedback' ? '回传' : '非回传';
    }

    function updateScopeUI() {
      const isFeedback = state.statsScope === 'feedback';
      document.getElementById('stats_scope_text').textContent = `当前统计：${getScopeText(state.statsScope)}`;
      document.getElementById('stats_scope_toggle_btn').textContent = isFeedback ? '切换到非回传统计' : '切换到回传统计';
    }

    function esc(v) {
      if (v === null || v === undefined) return '';
      return String(v).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }

    async function fetchJson(url, options) {
      const resp = await fetch(url, options);
      const data = await resp.json();
      if (!resp.ok) {
        throw new Error(data.error || ('请求失败: ' + resp.status));
      }
      return data;
    }

    function renderConfigs(items) {
      state.configs = items || [];
      const tbody = document.getElementById('cfg_tbody');
      tbody.innerHTML = state.configs.map(x => `
        <tr>
          <td>${esc(x.id)}</td>
          <td>${esc(x.sync_types)}</td>
          <td class="mono">${esc(x.watch_dir)}</td>
          <td class="mono">${esc(x.target_dir)}</td>
          <td>${x.is_feedback ? '<span class="warn">是</span>' : '<span>否</span>'}</td>
          <td>${x.enabled ? '<span class="ok">启用</span>' : '<span class="warn">停用</span>'}</td>
          <td>${esc(x.updated_at || '-')}</td>
          <td>
            <button type="button" onclick="editConfig(${Number(x.id)})">编辑</button>
            <button class="btn-danger" type="button" onclick="removeConfig(${Number(x.id)})">删除</button>
          </td>
        </tr>
      `).join('');
      if (!state.configs.length) {
        tbody.innerHTML = '<tr><td colspan="8" class="muted">暂无配置，请先新增。</td></tr>';
      }
    }

    async function loadConfigs() {
      const data = await fetchJson('/api/map-path-config');
      renderConfigs(data.items || []);
    }

    function openAddModal() {
      clearModalForm();
      document.getElementById('cfg_add_modal').classList.add('show');
    }

    function closeAddModal() {
      document.getElementById('cfg_add_modal').classList.remove('show');
    }

    async function saveNewConfig() {
      const id = document.getElementById('add_id').value.trim();
      const sync_types = document.getElementById('add_sync_types').value.trim().toUpperCase();
      const watch_dir = document.getElementById('add_watch_dir').value.trim();
      const target_dir = document.getElementById('add_target_dir').value.trim();
      const enabled = document.getElementById('add_enabled').checked;
      const is_feedback = document.getElementById('add_is_feedback').checked;

      if (!sync_types || !watch_dir || !target_dir) {
        alert('SYNC_TYPES/WATCH_DIR/TARGET_DIR 都不能为空');
        return;
      }

      const payload = { id: id || null, sync_types, watch_dir, target_dir, enabled, is_feedback };
      const data = await fetchJson('/api/map-path-config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      renderConfigs(data.items || []);
      clearModalForm();
      closeAddModal();
      alert(id ? '更新成功，监听目录已刷新' : '新增成功，监听目录已刷新');
    }

    function editConfig(id) {
      const item = (state.configs || []).find(x => Number(x.id) === Number(id));
      if (!item) return;
      document.getElementById('add_id').value = String(item.id);
      document.getElementById('add_sync_types').value = item.sync_types || '';
      document.getElementById('add_watch_dir').value = item.watch_dir || '';
      document.getElementById('add_target_dir').value = item.target_dir || '';
      document.getElementById('add_enabled').checked = Boolean(item.enabled);
      document.getElementById('add_is_feedback').checked = Boolean(item.is_feedback);
      document.getElementById('cfg_add_modal_title').textContent = '编辑来料路径配置';
      document.getElementById('cfg_add_save_btn').textContent = '确认更新';
      document.getElementById('cfg_add_modal').classList.add('show');
    }

    function clearModalForm() {
      document.getElementById('add_id').value = '';
      document.getElementById('add_sync_types').value = '';
      document.getElementById('add_watch_dir').value = '';
      document.getElementById('add_target_dir').value = '';
      document.getElementById('add_enabled').checked = true;
      document.getElementById('add_is_feedback').checked = false;
      document.getElementById('cfg_add_modal_title').textContent = '新增来料路径配置';
      document.getElementById('cfg_add_save_btn').textContent = '确认新增';
    }

    async function removeConfig(id) {
      if (!window.confirm('确认删除该配置吗？')) return;
      const data = await fetchJson('/api/map-path-config/delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id }),
      });
      renderConfigs(data.items || []);
    }

    async function loadData() {
      const params = new URLSearchParams({
        task_page: String(state.task.page),
        task_page_size: String(state.task.page_size),
        task_q: state.task.q,
        stats_scope: state.statsScope,
        record_page: String(state.record.page),
        record_page_size: String(state.record.page_size),
        record_q: state.record.q,
      });
      const data = await fetchJson('/api/dashboard?' + params.toString());
      state.statsScope = data.scope === 'feedback' ? 'feedback' : 'normal';
      updateScopeUI();
      const s = data.summary || {};

      document.getElementById('total_tasks').textContent = s.total_tasks ?? 0;
      document.getElementById('pending_tasks').textContent = s.pending_tasks ?? 0;
      document.getElementById('success_tasks').textContent = s.success_tasks ?? 0;
      document.getElementById('failed_tasks').textContent = s.failed_tasks ?? 0;
      document.getElementById('total_records').textContent = s.total_records ?? 0;

      document.getElementById('type_tbody').innerHTML = (data.by_type || []).map(x => `
        <tr>
          <td>${esc(x.type)}</td>
          <td>${esc(x.task_count)}</td>
          <td>${esc(x.last_update || '-')}</td>
        </tr>
      `).join('');

      const taskData = data.recent_tasks || {};
      const taskItems = taskData.items || [];
      document.getElementById('task_tbody').innerHTML = taskItems.map(x => `
        <tr>
          <td>${esc(x.updated_at || '-')}</td>
          <td>${esc(x.type)}</td>
          <td class="mono">${esc(x.zip_name)}</td>
          <td>${x.is_feedback ? '<span class="pill feedback">回传</span>' : '<span class="pill normal">非回传</span>'}</td>
          <td><span class="status ${esc(x.status)}">${esc(x.status)}</span></td>
          <td>${esc(x.error_msg || '-')}</td>
        </tr>
      `).join('');
      document.getElementById('task_pager').textContent = `第 ${taskData.page || 1}/${taskData.total_pages || 1} 页，共 ${taskData.total || 0} 条`;
      document.getElementById('task_prev_btn').disabled = (taskData.page || 1) <= 1;
      document.getElementById('task_next_btn').disabled = (taskData.page || 1) >= (taskData.total_pages || 1);

      const recordData = data.recent_records || {};
      const recordItems = recordData.items || [];
      document.getElementById('record_tbody').innerHTML = recordItems.map(x => `
        <tr>
          <td>${esc(x.created_at || '-')}</td>
          <td>${esc(x.type)}</td>
          <td>${esc(x.lot_id)}</td>
          <td>${esc(x.wafer_id)}</td>
          <td class="mono">${esc(x.zip_name)}</td>
          <td class="mono">${esc(x.zip_path || '-')}</td>
        </tr>
      `).join('');
      document.getElementById('record_pager').textContent = `第 ${recordData.page || 1}/${recordData.total_pages || 1} 页，共 ${recordData.total || 0} 条`;
      document.getElementById('record_prev_btn').disabled = (recordData.page || 1) <= 1;
      document.getElementById('record_next_btn').disabled = (recordData.page || 1) >= (recordData.total_pages || 1);

      document.getElementById('refresh_time').textContent = '更新时间：' + esc(data.generated_at || '-');
    }

    let loading = false;
    async function tick() {
      if (loading) return;
      loading = true;
      try {
        await loadData();
      } catch (e) {
        console.error('加载失败', e);
      } finally {
        loading = false;
      }
    }

    function bindToolbar() {
      const taskQ = document.getElementById('task_q');
      const taskPageSize = document.getElementById('task_page_size');
      const recordQ = document.getElementById('record_q');
      const recordPageSize = document.getElementById('record_page_size');

      document.getElementById('cfg_add_btn').addEventListener('click', openAddModal);
      document.getElementById('cfg_add_cancel_btn').addEventListener('click', closeAddModal);
      document.getElementById('cfg_add_save_btn').addEventListener('click', async () => {
        try {
          await saveNewConfig();
        } catch (e) {
          alert(e.message || '新增失败');
        }
      });

      document.getElementById('task_search_btn').addEventListener('click', () => {
        state.task.q = taskQ.value.trim();
        state.task.page_size = Number(taskPageSize.value) || 20;
        state.task.page = 1;
        tick();
      });
      taskQ.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') document.getElementById('task_search_btn').click();
      });
      taskPageSize.addEventListener('change', () => {
        state.task.page_size = Number(taskPageSize.value) || 20;
        state.task.page = 1;
        tick();
      });
      document.getElementById('task_prev_btn').addEventListener('click', () => {
        if (state.task.page > 1) {
          state.task.page -= 1;
          tick();
        }
      });
      document.getElementById('task_next_btn').addEventListener('click', () => {
        state.task.page += 1;
        tick();
      });

      document.getElementById('record_search_btn').addEventListener('click', () => {
        state.record.q = recordQ.value.trim();
        state.record.page_size = Number(recordPageSize.value) || 20;
        state.record.page = 1;
        tick();
      });
      recordQ.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') document.getElementById('record_search_btn').click();
      });
      recordPageSize.addEventListener('change', () => {
        state.record.page_size = Number(recordPageSize.value) || 20;
        state.record.page = 1;
        tick();
      });
      document.getElementById('record_prev_btn').addEventListener('click', () => {
        if (state.record.page > 1) {
          state.record.page -= 1;
          tick();
        }
      });
      document.getElementById('record_next_btn').addEventListener('click', () => {
        state.record.page += 1;
        tick();
      });

      document.getElementById('stats_scope_toggle_btn').addEventListener('click', () => {
        state.statsScope = state.statsScope === 'feedback' ? 'normal' : 'feedback';
        state.task.page = 1;
        state.record.page = 1;
        updateScopeUI();
        tick();
      });
    }

    function stopAutoRefresh() {
      if (state.refreshTimer) {
        clearInterval(state.refreshTimer);
        state.refreshTimer = null;
      }
    }

    function startAutoRefresh() {
      if (state.refreshTimer) return;
      state.refreshTimer = setInterval(tick, 5000);
    }

    function switchPage(page, updateHash) {
      const nextPage = page === 'config' ? 'config' : 'stats';
      state.currentPage = nextPage;

      document.getElementById('page_stats').classList.toggle('active', nextPage === 'stats');
      document.getElementById('page_config').classList.toggle('active', nextPage === 'config');
      document.getElementById('nav_stats').classList.toggle('active', nextPage === 'stats');
      document.getElementById('nav_config').classList.toggle('active', nextPage === 'config');

      if (updateHash) {
        window.location.hash = nextPage;
      }

      if (nextPage === 'config') {
        stopAutoRefresh();
        loadConfigs().catch(e => console.error('加载配置失败', e));
      } else {
        tick();
        startAutoRefresh();
      }
    }

    function bindNav() {
      document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const page = btn.getAttribute('data-page') || 'stats';
          switchPage(page, true);
        });
      });
      window.addEventListener('hashchange', () => {
        const page = (window.location.hash || '').replace('#', '');
        switchPage(page, false);
      });
    }

    bindToolbar();
    bindNav();
    updateScopeUI();
